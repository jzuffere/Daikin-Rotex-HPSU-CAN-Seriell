esphome:
    name: hpsu-can
    friendly_name: HPSU.CAN

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

external_components:
  - source:
      type: git
      url: https://github.com/Trunks1982/Daikin-Rotex-HPSU-CAN.git
      ref: main   # Remplacer “main” par “dev” si tu veux la branche de développement
    refresh: 0s

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  platform: esphome
  password: !secret ota_password

web_server:
  version: 3

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  power_save_mode: none

  ap:
    ssid: DaikinRotex Fallback Hotspot
    password: H3jGqANSa7aL

captive_portal:

time:
  - platform: homeassistant

debug:
  update_interval: 5s

sensor:
  - platform: uptime
    type: seconds
    name: Uptime Seconds
  - platform: uptime
    type: timestamp
    name: Uptime Timestamp
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s

button:
  - platform: restart
    name: "Rotex ESP Restart"
#switch:
#  - platform: gpio
#    name: Smart Grid
#    pin:
#      number: GPIO06
#      inverted: true

#  - platform: gpio
#    name: EVU
#    pin:
#      number: GPIO05
#      inverted: true

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
    ssid:
      name: ESP Connected SSID

canbus:
  - platform: esp32_can
    id: can_bus
    can_id: 0x680
    tx_pin: GPIO5
    rx_pin: GPIO6
    bit_rate: 20kbps

daikin_rotex_can:
  id: rotext_hpsu
  language: fr
  canbus_id: can_bus
  update_interval: 30s

  # Certains capteurs Tv, TvBH, ou Tr peuvent avoir des dérives.
  # Ces dérives peuvent être compensées afin d'améliorer la détection de vannes 3-voies défectueuses.
  # Par exemple, si le capteur Tv montre une température 1.5°C trop haute, le Tv offset l'abaissera de -1.5.
  # Idem pour TvBH et Tr.
  #tv_offset: -1.0
  #tvbh_offset: -1.0
  #tr_offset: -1.0

  #max_spread_tvbh_tv: 0.5  # Legt Tv-TVBH-Schwellwert fest, bei dem die DHW-Ventil-Fehler-Erkennung auslösen soll
  #max_spread_tvbh_tr: 0.5  # Legt TVBH-Tr-Schwellwert fest, bei dem die BPV-Ventil-Fehler-Erkennung auslösen soll

  log_filter:
    name: Log Filter
  custom_request:
    name: Custom Request
  dump:
    name: Dump Senors
  project_git_hash:
    name: Project Git Hash
  entities:

# Info

    error_code:
      name: Code d'erreur

    mode_of_operating:
      name: Mode de Fonctionnement
    ext:
      name: Ext
# RT
    circulation_pump:
      name: Pompe Circulation
# EHS
    bypass_valve:
      name: Vanne Bypass
    tv:
      name: TV
      update_interval: 5s
    tvbh:
      name: TVBH
      update_interval: 5s
    tr:
      name: TR
      update_interval: 5s
    tdhw1:
      name: Température eau chaude
    tdhw2:
      name: Température eau chaude 2
    temperature_outside:
      name: Température extérieure
# V
# TVBH2
# TR2
# Tdhw2
    tliq:
      name: Température Conduite Liquide
    ta2:
      name: TA2
# quiet

# Overview
    water_pressure:
      name: Pression d'eau
    t_hs:
      name: T-WE
# T-WE Soll
    t_ext:
      name: T-Extérieure
# T-WW
# T-WW Soll
# T-Rücklauf
    flow_rate:
      name: Débit
      update_interval: 10s
# T-HK
# T-HK Soll
    status_kesselpumpe:
      name: Statut Pompe Circulation
    status_kompressor:
      name: Statut Compresseur
    runtime_compressor:
      name: Temps Fonctionnement Compresseur
    runtime_pump:
      name: Temps Fonctionnement Pompe
    dhw_mixer_position:
      name: Position Mélangeur ECS
    qboh:
      name: EHS pour ECS
    ehs_for_ch:
      name: EHS pour CH
    energy_cooling:
      name: Energie Refroidissement
    qch:
      name: Energie Chauffage
    total_energy_produced:
      name: Total Energie Produite
    qdhw:
      name: Energie pour ECS
    total_electrical_energy:
      name: Total Energie Electrique
#WE Typ
#SwNr B1/U1
#SwNr Regler
#SwNr RTXRT

